version: "0.5"

log_level: info

environment:
  - PATH=/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

processes:
  picoclaw:
    command: "/usr/local/bin/picoclaw gateway"
    availability:
      restart: "always"
      backoff_seconds: 3
      max_restarts: 5
    readiness_probe:
      http_get:
        host: localhost
        port: ${PICOCLAW_GATEWAY_PORT:-18790}
        path: /health
      initial_delay_seconds: 2
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
    environment:
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
      - PICOCLAW_GATEWAY_PORT=18790
    log_configuration:
      disable_json: true
      no_metadata: false
      add_timestamp: true
      timestamp_format: "2006-01-02 15:04:05.000"
      fields_to_append:
        - level=INFO

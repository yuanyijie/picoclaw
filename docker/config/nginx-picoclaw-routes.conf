# PicoClaw routes — proxied through the AIO nginx entrypoint (port 5000)

# Health / readiness probes
location /picoclaw/health {
    rewrite ^/picoclaw/health$ /health break;
    proxy_pass http://picoclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /picoclaw/ready {
    rewrite ^/picoclaw/ready$ /ready break;
    proxy_pass http://picoclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Catch-all for picoclaw API and webhook endpoints
location /picoclaw/ {
    rewrite ^/picoclaw/(.*)$ /$1 break;
    proxy_pass http://picoclaw;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
